<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Case File — Interactive Resume Builder</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <!-- Resume Builder Content Will Be Added Here -->
       
      <!-- ============ FORM SIDE ============ -->
       <section class="intake" aria-label="Resume information form">
        <header class="intake__header">
          <div class="intake__title-block">
            <p class="eyebrow">Case File &middot; Personnel Record</p>
            <h1 class="intake__title">Build Your Resume</h1>
            <p class="intake__subtitle">Fill in the form below — your document takes shape on the right, in real time.</p>
          </div>
        </header>
        <!-- Signature element: ink-seal completion dial -->
         <div class="seal" id="seal" aria-hidden="false" role="img" aria-label="Form completion status">
          <svg viewBox="0 0 120 120" class="seal__ring">
            <circle class="seal__track" cx="60" cy="60" r="52"></circle>
            <circle class="seal__progress" id="sealProgress" cx="60" cy="60" r="52"></circle>
          </svg>
          <div class="seal__center">
            <span class="seal__percent" id="sealPercent">0%</span>
            <span class="seal__label" id="sealLabel">DRAFT</span>
          </div>
        </div>
      </header>
      
      <form id="resumeForm" novalidate>
          <!-- Personal details -->
      <fieldset class="field-group">
        <legend>01 — Identity</legend>
 
        <div class="field">
          <label for="fullName">Full name</label>
          <input type="text" id="fullName" name="fullName" placeholder="Jordan Alvarez" autocomplete="name">
        </div>
 
        <div class="field-row">
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="jordan@example.com" autocomplete="email">
          </div>
          <div class="field">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" placeholder="(555) 019-2233" autocomplete="tel">
          </div>
        </div>
 
        <div class="field">
          <label for="location">Location <span class="optional">(optional)</span></label>
          <input type="text" id="location" name="location" placeholder="Austin, TX">
        </div>
      </fieldset>
      <fieldset class="field-group">
        <legend>02 — Summary</legend>
        <div class="field">
          <label for="summary">Profile summary</label>
          <textarea id="summary" name="summary" rows="4" placeholder="A short statement of who you are and what you're looking for..."></textarea>
        </div>
      </fieldset>
 
      <!-- Skills -->
      <fieldset class="field-group">
        <legend>03 — Skills</legend>
        <div class="field">
          <label for="skillInput">Add a skill and press Enter</label>
          <input type="text" id="skillInput" placeholder="e.g. Python, Figma, Public Speaking">
          <div class="tag-list" id="tagList" aria-live="polite"></div>
        </div>
      </fieldset>
      
        <!-- Education -->
      <fieldset class="field-group">
        <legend>04 — Education</legend>
        <div id="educationList" class="repeat-list"></div>
        <button type="button" class="btn btn--ghost" id="addEducation">+ Add education</button>
      </fieldset>
 
      <!-- Experience -->
      <fieldset class="field-group">
        <legend>05 — Experience</legend>
        <div id="experienceList" class="repeat-list"></div>
        <button type="button" class="btn btn--ghost" id="addExperience">+ Add experience</button>
      </fieldset>
 
      <div class="action-row">
        <button type="button" class="btn btn--primary" id="downloadPdf">Download as PDF</button>
        <button type="button" class="btn btn--danger" id="clearForm">Clear form</button>
      </div>
    </form>
  </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
